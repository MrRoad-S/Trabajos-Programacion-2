<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tarea</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kirbyPink: '#ffb6d9',
                        kirbyDarkPink: '#ff6fae',
                        kirbyBlue: '#7dd3fc',
                        kirbyYellow: '#fde68a',
                        kirbyBg: '#fff1f7'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-50 to-sky-100 min-h-screen text-pink-900">

    <div th:replace="layouts/plantilla :: header"></div>

    <main class="max-w-3xl mx-auto mt-14 bg-white/80 backdrop-blur-sm shadow-2xl rounded-3xl p-10 border-4 border-pink-200">

        <h2 
            th:text="${tarea.id} != null ? 'Editar Tarea' : 'Nueva Tarea'"
            class="text-5xl font-extrabold text-pink-500 mb-10 text-center drop-shadow-sm"
        ></h2>

        <form 
            th:action="@{/tareas}" 
            th:object="${tarea}" 
            method="post"
            class="space-y-8"
        >

            <input type="hidden" th:field="*{id}">

            <div class="flex flex-col gap-3">

                <label class="text-lg font-bold text-pink-700">
                    Descripción:
                </label>

                <input 
                    type="text" 
                    th:field="*{descripcion}" 
                    required
                    class="w-full px-5 py-4 rounded-2xl border-2 border-pink-200 bg-pink-50 focus:outline-none focus:ring-4 focus:ring-pink-300 focus:border-pink-400 text-pink-900 shadow-sm transition duration-300"
                    placeholder="Describe tu tarea ✨"
                >

            </div>

            <div class="flex flex-col gap-3">

                <label class="text-lg font-bold text-pink-700">
                    Categoría:
                </label>

                <select 
                    th:field="*{categoria.id}" 
                    required
                    class="w-full px-5 py-4 rounded-2xl border-2 border-sky-200 bg-sky-50 focus:outline-none focus:ring-4 focus:ring-sky-300 focus:border-sky-400 text-pink-900 shadow-sm transition duration-300"
                >

                    <option 
                        th:each="c : ${categorias}"
                        th:value="${c.id}"
                        th:text="${c.nombre}">
                    </option>

                </select>

            </div>

            <div class="bg-pink-50 border-2 border-pink-200 rounded-2xl px-5 py-4 shadow-sm">

                <label class="flex items-center gap-4 text-lg font-semibold text-pink-700 cursor-pointer">

                    <input 
                        type="checkbox" 
                        th:field="*{completada}"
                        class="w-6 h-6 accent-pink-500 rounded"
                    >

                    🌟 Completada

                </label>

            </div>

            <div>

                <button 
                    type="submit"
                    class="w-full bg-pink-400 hover:bg-pink-500 text-white font-bold text-xl py-4 rounded-2xl shadow-lg transition duration-300 transform hover:scale-105"
                >
                    💖 Guardar
                </button>

            </div>

        </form>

        <a 
            th:href="@{/tareas}"
            class="mt-8 inline-block text-pink-700 hover:text-pink-500 font-semibold transition duration-300"
        >
            ← Volver a la lista
        </a>

    </main>

    <div th:replace="layouts/plantilla :: footer"></div>

</body>
</html>
