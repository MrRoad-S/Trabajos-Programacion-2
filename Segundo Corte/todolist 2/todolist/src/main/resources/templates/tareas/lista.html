<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tareas</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kirbyPink: '#ffb6d9',
                        kirbyDarkPink: '#ff6fae',
                        kirbyBlue: '#7dd3fc',
                        kirbyYellow: '#fde68a',
                        kirbyBg: '#fff1f7'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-50 to-sky-100 min-h-screen text-pink-900">

    <div th:replace="layouts/plantilla :: header"></div>

    <main class="max-w-6xl mx-auto mt-14 bg-white/80 backdrop-blur-sm shadow-2xl rounded-3xl p-10 border-4 border-pink-200">

        <h2 class="text-5xl font-extrabold text-pink-500 mb-8 text-center drop-shadow-sm">
            Lista de Tareas
        </h2>

        <a 
            th:href="@{/tareas/nueva}"
            class="inline-block mb-8 bg-pink-400 hover:bg-pink-500 text-white font-bold px-6 py-3 rounded-2xl shadow-lg transition duration-300 transform hover:scale-105"
        >
            ➕ Nueva Tarea
        </a>

        <br><br>

        <div class="overflow-x-auto rounded-3xl shadow-lg border-4 border-pink-200">

            <table border="1" class="w-full border-collapse overflow-hidden">

                <thead class="bg-pink-300 text-white text-lg">
                    <tr>
                        <th class="py-4 px-6 text-left">ID</th>
                        <th class="py-4 px-6 text-left">Descripción</th>
                        <th class="py-4 px-6 text-left">Categoría</th>
                        <th class="py-4 px-6 text-center">Estado</th>
                        <th class="py-4 px-6 text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody class="bg-white">

                    <tr 
                        th:each="t : ${tareas}"
                        class="border-b border-pink-100 hover:bg-pink-50 transition duration-300"
                    >

                        <td 
                            th:text="${t.id}"
                            class="py-4 px-6 font-semibold text-pink-700"
                        ></td>

                        <td 
                            th:text="${t.descripcion}"
                            class="py-4 px-6 text-pink-800"
                        ></td>

                        <td 
                            th:text="${t.categoria.nombre}"
                            class="py-4 px-6 text-sky-600 font-semibold"
                        ></td>

                        <td class="py-4 px-6 text-center">

                            <span 
                                th:text="${t.completada ? 'Completada' : 'Pendiente'}"
                                th:classappend="${t.completada} ? 
                                'bg-green-200 text-green-800' : 
                                'bg-yellow-200 text-yellow-800'"
                                class="px-4 py-2 rounded-full text-sm font-bold shadow-sm"
                            ></span>

                        </td>

                        <td class="py-4 px-6">

                            <div class="flex flex-wrap gap-3 justify-center">

                                <a 
                                    th:href="@{'/tareas/editar/' + ${t.id}}"
                                    class="bg-sky-300 hover:bg-sky-400 text-white font-bold px-4 py-2 rounded-xl shadow transition duration-300"
                                >
                                    ✏️ Editar
                                </a>

                                <a 
                                    th:href="@{'/tareas/eliminar/' + ${t.id}}"
                                    onclick="return confirm('¿Eliminar esta tarea?')"
                                    class="bg-pink-300 hover:bg-pink-400 text-white font-bold px-4 py-2 rounded-xl shadow transition duration-300"
                                >
                                    🗑️ Eliminar
                                </a>

                                <a 
                                    th:href="@{'/tareas/completar/' + ${t.id}}"
                                    class="bg-yellow-300 hover:bg-yellow-400 text-pink-900 font-bold px-4 py-2 rounded-xl shadow transition duration-300"
                                >
                                    ⭐ Completar
                                </a>

                            </div>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

    <div th:replace="layouts/plantilla :: footer"></div>

</body>
</html>
