<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kirbyGold: '#f6c445',
                        kirbyCream: '#fff4c7',
                        kirbyBlue: '#67c8ff',
                        kirbyDarkBlue: '#2b8fd8',
                        kirbyPink: '#ff92c2',
                        kirbyBg: '#dff5ff'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-b from-sky-200 via-cyan-100 to-yellow-100 text-slate-700 min-h-screen">

    <header 
        th:fragment="header"
        class="relative overflow-hidden"
    >

        <!-- Fondo decorativo -->
        <div class="absolute inset-0 bg-gradient-to-r from-yellow-300 via-yellow-200 to-yellow-400"></div>

        <!-- Burbujas decorativas -->
        <div class="absolute top-0 left-0 w-40 h-40 bg-white/20 rounded-full blur-2xl"></div>
        <div class="absolute bottom-0 right-0 w-52 h-52 bg-pink-200/30 rounded-full blur-3xl"></div>

        <div class="relative max-w-7xl mx-auto px-8 py-6 flex flex-col lg:flex-row items-center justify-between gap-6 border-b-[10px] border-yellow-500 shadow-2xl rounded-b-[45px]">

            <!-- Logo -->
            <div class="flex items-center gap-5">

                <div 
                    class="w-20 h-20 rounded-full bg-gradient-to-br from-pink-300 to-pink-500 border-[6px] border-pink-100 flex items-center justify-center shadow-xl"
                >

                    <span class="text-white text-4xl font-black drop-shadow-md">
                        ✓
                    </span>

                </div>

                <h1 class="text-5xl font-black text-yellow-800 tracking-wide drop-shadow-sm">
                    Todo List
                </h1>

            </div>

            <!-- Navegación -->
            <nav class="flex flex-wrap items-center justify-center gap-5">

                <a 
                    th:href="@{/}"
                    class="bg-gradient-to-b from-sky-300 to-blue-400 hover:scale-105 transition duration-300 text-white font-black text-xl px-8 py-4 rounded-[25px] border-[5px] border-cyan-100 shadow-xl"
                >
                    🏠 Inicio
                </a>

                <a 
                    th:href="@{/tareas}"
                    class="bg-gradient-to-b from-lime-300 to-green-400 hover:scale-105 transition duration-300 text-white font-black text-xl px-8 py-4 rounded-[25px] border-[5px] border-lime-100 shadow-xl"
                >
                    ⭐ Tareas
                </a>

                <a 
                    th:href="@{/categorias}"
                    class="bg-gradient-to-b from-pink-300 to-rose-400 hover:scale-105 transition duration-300 text-white font-black text-xl px-8 py-4 rounded-[25px] border-[5px] border-pink-100 shadow-xl"
                >
                    🌈 Categorías
                </a>

            </nav>

        </div>

        <div class="h-4 bg-gradient-to-r from-yellow-400 via-orange-300 to-yellow-400 shadow-inner"></div>

    </header>

    <footer 
        th:fragment="footer"
        class="mt-16 relative overflow-hidden"
    >

        <div class="absolute inset-0 bg-gradient-to-r from-yellow-300 via-yellow-200 to-yellow-400"></div>

        <div class="relative max-w-6xl mx-auto px-8 py-6 text-center border-t-[8px] border-yellow-500 rounded-t-[35px] shadow-2xl">

            <div class="inline-flex items-center gap-3 bg-yellow-100 border-4 border-yellow-300 rounded-full px-8 py-3 shadow-lg">

                <span class="text-2xl">✨</span>

                <div class="text-yellow-800 text-xl font-black tracking-wide">
                    Aplicación con Spring Boot
                </div>

                <span class="text-2xl">⭐</span>

            </div>

        </div>

    </footer>

</body>
</html>
