spring.application.name=Ejemplo1

# 1. Conexión a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/ejemplo3303d?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. Configuración de Hibernate
# 'update' creará las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
# para mirar el código SQL en la consola
spring.jpa.show-sql=true
# Dialecto para asegurar que Hibernate hable bien con MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

