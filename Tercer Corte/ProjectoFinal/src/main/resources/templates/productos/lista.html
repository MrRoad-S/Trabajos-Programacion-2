<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
</head>
<body>

    <div th:replace="layouts/plantilla :: header"></div>

    <main>

        <h2>Lista de Productos</h2>

      
        <div th:if="${error}">
            <p th:text="${error}"></p>
        </div>

     
        <a th:href="@{/productos/nueva}">Nuevo producto</a>

        <br><br>

       
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Stock</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nombre}"></td>
                    <td th:text="${p.stock}"></td>
                    <td th:text="${p.disponible ? 'Disponible' : 'Sin stock'}"></td>
                    <td>
                        <a th:href="@{'/productos/editar/' + ${p.id}}">
                            Editar
                        </a>
                        
                        <a th:href="@{'/productos/eliminar/' + ${p.id}}"
                           onclick="return confirm('¿Seguro que deseas eliminar este producto?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

    <div th:replace="layouts/plantilla :: footer"></div>

</body>
</html>
